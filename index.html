<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sebuah Catatan untukmu</title>
    <style>
        body { margin: 0; background: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; overflow: hidden; }
        .box { width: 80%; max-width: 400px; padding: 30px; background: #1e1e1e; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.5s; }
        button { background: #bb86fc; border: none; padding: 10px 20px; border-radius: 5px; color: #000; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #9965f4; }
        .hidden { display: none; }
        .flower { position: absolute; font-size: 20px; animation: float linear infinite; }
        @keyframes float { 0% { transform: translateY(100vh); } 100% { transform: translateY(-10vh); } }
    </style>
</head>
<body>

    <div id="step1" class="box">
        <p>Halo nat, aku ada suatu pesan untukmu.</p>
        <button onclick="next(1)">Lanjut</button>
    </div>

    <div id="step2" class="box hidden">
        <p>Candaan aku soal game, soal "bot" dan <i>poke</i> itu keterlaluan. dan sebetulnya kamu jago banget kok.</p>
        <button onclick="next(2)">Lanjut</button>
    </div>

    <div id="step3" class="box hidden">
        <p>I'm sorry for hurting you. Aku  bakal lebih mikir lagi sebelum bercanda.</p>
        <p style="font-size: 0.9em; margin-top: 15px;">Is there still a chance for me?</p>
    </div>

    <script>
        function next(step) {
            document.getElementById('step' + step).classList.add('hidden');
            document.getElementById('step' + (step + 1)).classList.remove('hidden');
        }

        function createFlower() {
            const f = document.createElement('div');
            f.innerHTML = '🪻';
            f.className = 'flower';
            f.style.left = Math.random() * 100 + 'vw';
            f.style.animationDuration = (Math.random() * 5 + 5) + 's';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 10000);
        }
        setInterval(createFlower, 1500);
    </script>
</body>
</html>
